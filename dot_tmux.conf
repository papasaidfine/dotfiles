# change prefix to Ctrl-a
# unbind C-b
# set-option -g prefix C-a
# bind-key C-a send-prefix

# Set TERM for applications inside tmux
set -g default-terminal "tmux-256color"
# Override for the *external* terminal
set -ag terminal-overrides ",xterm-256color:RGB"
# Enable true color support
set-environment -g COLORTERM truecolor

set -g mouse on
set -g renumber-windows on

# resolve the strange characters "0;10;1c" apearing on tmux startup
set -sg escape-time 0
set-environment -g NORD_TMUX_STATUS_TIME_FORMAT "%H:%M:%S"

# source config file
# bind r source-file ~/.tmux.conf

# allow terminal scrolling
set -ag terminal-overrides ',xterm*:smcup@:rmcup@'

# vi mode
set -g mode-keys vi
set -g status-keys vi

# moving between panes with vim movement keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize the pane
bind-key -r J resize-pane -D 3
bind-key -r K resize-pane -U 3
bind-key -r H resize-pane -L 3
bind-key -r L resize-pane -R 3

# List of plugins needed for tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'
# set -g @plugin 'wfxr/tmux-power'
# set -g @tmux_power_theme 'moon'
# set -g @plugin "arcticicestudio/nord-tmux"
set -g @plugin "nordtheme/tmux"
set -g @plugin 'tmux-plugins/tmux-yank'

# starting path of the created window is same as current's
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
